<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>{{ shop.name }} - CRITICS ARCHIVE</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#0a0a0a;color:#f5f5f5;overflow-x:hidden}
a{text-decoration:none;color:inherit}
header{position:fixed;width:100%;display:flex;justify-content:space-between;align-items:center;padding:20px 60px;background:rgba(10,10,10,0.8);backdrop-filter:blur(10px);z-index:1000}
.logo{font-weight:900;letter-spacing:4px;font-size:14px}
nav a{margin-left:30px;font-size:13px;opacity:.8;transition:.3s}
nav a:hover{opacity:1}
.cart-count{background:#ec9090;color:#aa1a1a;font-size:11px;padding:2px 6px;border-radius:20px;margin-left:6px}
.hero{height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center}
.hero h1{font-size:5rem;font-weight:900;letter-spacing:6px}
.hero p{margin-top:20px;letter-spacing:3px;font-size:14px;opacity:.7}
.hero button{margin-top:40px;padding:14px 40px;background:#fff;color:#000;border:none;font-weight:600;cursor:pointer;transition:.3s}
.hero button:hover{transform:translateY(-3px);box-shadow:0 10px 30px rgba(255,255,255,0.2)}
.section{padding:120px 80px;max-width:1400px;margin:auto}
.section-title{font-size:28px;margin-bottom:60px;letter-spacing:3px}
.products{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:40px}
.product{cursor:pointer;transition:.4s}
.product img{width:100%;height:400px;object-fit:cover}
.product h3{margin-top:15px;font-weight:500}
.product p{opacity:.6;font-size:14px;margin-top:5px}
.product:hover{transform:translateY(-8px)}
.product-page{display:none;padding:120px 80px;max-width:1200px;margin:auto;grid-template-columns:1fr 1fr;gap:60px}
.product-page img{width:100%;height:600px;object-fit:cover}
.product-page h2{font-size:32px;margin-bottom:20px}
.product-page button{margin-top:20px;padding:14px 40px;background:#fff;color:#000;border:none;cursor:pointer}
.cart-drawer{position:fixed;right:-400px;top:0;width:400px;height:100vh;background:#111;padding:40px;transition:.4s;z-index:2000;overflow-y:auto}
.cart-drawer.open{right:0}
.cart-drawer h3{margin-bottom:30px}
.cart-item{display:flex;justify-content:space-between;margin-bottom:20px;font-size:14px}
footer{padding:60px;text-align:center;border-top:1px solid #222;font-size:12px;opacity:.6}
.fade-in{opacity:0;transform:translateY(20px);transition:1s}
.fade-in.visible{opacity:1;transform:translateY(0)}
</style>
</head>
<body>

<header>
<div class="logo">CRITICS ARCHIVE</div>
<nav>
<a href="#shop">Shop</a>
<a href="#about">About</a>
<a href="#faq">FAQ</a>
<a href="#" onclick="toggleCart()">Cart <span class="cart-count" id="cartCount">0</span></a>
</nav>
</header>

<section class="hero">
<h1>SWAG IS ART</h1>
<p>MINIMAL LUXURY / ARCHIVED STREETWEAR</p>
<button onclick="scrollToShop()">SHOP COLLECTION</button>
</section>

<section class="section fade-in" id="shop">
<div class="section-title">ARCHIVE 001</div>
<div class="products">
<div class="product" onclick="openProduct('Archive Tee',120,'https://images.unsplash.com/photo-1520975922284-6c6c6c6c6c6c')">
<img src="https://images.unsplash.com/photo-1520975922284-6c6c6c6c6c6c" />
<h3>Archive Tee</h3>
<p>$120</p>
</div>
<div class="product" onclick="openProduct('Surveillance Hoodie',220,'https://images.unsplash.com/photo-1602810318383-e386cc2a3ccf')">
<img src="https://images.unsplash.com/photo-1602810318383-e386cc2a3ccf" />
<h3>Surveillance Hoodie</h3>
<p>$220</p>
</div>
<div class="product" onclick="openProduct('Identity Jacket',350,'https://images.unsplash.com/photo-1593032465171-8a7d9d6c4f75')">
<img src="https://images.unsplash.com/photo-1593032465171-8a7d9d6c4f75" />
<h3>Identity Jacket</h3>
<p>$350</p>
</div>
</div>
</section>

<section class="product-page" id="productPage"></section>

<div class="cart-drawer" id="cartDrawer">
<h3>Your Archive</h3>
<div id="cartItems"></div>
<h4>Total: $<span id="cartTotal">0</span></h4>
</div>

<footer>
© {{ 'now' | date: "%Y" }} CRITICS ARCHIVE — Swag Is Art
</footer>

<script>
let cart=[];
function scrollToShop(){document.getElementById('shop').scrollIntoView({behavior:'smooth'})}
function openProduct(name,price,img){
const page=document.getElementById('productPage');
page.style.display='grid';
page.innerHTML=`<img src="${img}"><div><h2>${name}</h2><p>$${price}</p><p>Nothing here is accidental. Everything is archived.</p><button onclick="addToCart('${name}',${price})">Add to Cart</button></div>`;
window.scrollTo({top:page.offsetTop-80,behavior:'smooth'});
}
function addToCart(name,price){cart.push({name,price});updateCart();toggleCart();}
function updateCart(){
const items=document.getElementById('cartItems');
const count=document.getElementById('cartCount');
const total=document.getElementById('cartTotal');
items.innerHTML='';
let sum=0;
cart.forEach(item=>{sum+=item.price;items.innerHTML+=`<div class='cart-item'><span>${item.name}</span><span>$${item.price}</span></div>`});
count.innerText=cart.length;
total.innerText=sum;
}
function toggleCart(){document.getElementById('cartDrawer').classList.toggle('open')}
const observer=new IntersectionObserver(entries=>{entries.forEach(entry=>{if(entry.isIntersecting){entry.target.classList.add('visible')}})});
document.querySelectorAll('.fade-in').forEach(el=>observer.observe(el));
</script>

</body>
</html>
